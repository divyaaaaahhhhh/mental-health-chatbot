<!DOCTYPE html>
<html>
<head>
    <title>SafeSpace AI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-animation">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<div class="chat-container">
    <h2>SafeSpace AI</h2>
    <p class="subtitle">Your safe space to talk, relax & heal 💜</p>

    <div id="chat-box"></div>
    <div class="mood-buttons">
    <button onclick="quickMessage('I feel stressed')">😔 Stressed</button>
    <button onclick="quickMessage('I feel anxious')">😟 Anxious</button>
    <button onclick="quickMessage('I feel happy')">😊 Happy</button>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="How are you feeling today?">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
